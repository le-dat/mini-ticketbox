services:
  postgres:
    image: postgres:15-alpine
    container_name: ticketbox-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ticketbox-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ticketbox-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
    depends_on:
      - postgres
    networks:
      - ticketbox-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ticketbox-frontend
    ports:
      - "5173:5173"
    networks:
      - ticketbox-network

volumes:
  pgdata:

networks:
  ticketbox-network:
    driver: bridge
